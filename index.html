<!DOCTYPE html>
<html>
<head>
    <title>Skillz Test</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        #output {
            margin-top: 10px;
            font-weight: bold;
            color: red;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Create an account</h2>
    Full Name:
    <input type="text" id="fullname" placeholder="Title Case Format Required">
    Username:
    <input type="text" id="username" placeholder="At least 7 characters">
    Password:
    <input type="password" id="password" placeholder="At least 10 characters, 1 letter & 1 number">

    <button py-click="validate_account">Sign Up</button>

    <div id="output"></div>
</div>

<py-script src="main.py"></py-script>

</body>
</html>
